<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>City Wars</title>
    <link

      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%230b1220'/%3E%3Crect x='4' y='14' width='24' height='14' fill='%231e293b'/%3E%3Crect x='8' y='8' width='6' height='12' fill='%230ea5e9'/%3E%3Crect x='18' y='4' width='8' height='16' fill='%2338bdf8'/%3E%3C/svg%3E"
