<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="City Wars">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="55%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded app tile -->
  <rect width="512" height="512" rx="96" fill="url(#sky)"/>

  <!-- Stars / grit dots -->
  <g fill="#e2e8f0" opacity="0.55">
    <circle cx="72" cy="64" r="3"/>
    <circle cx="140" cy="48" r="2"/>
    <circle cx="220" cy="70" r="2.5"/>
    <circle cx="300" cy="40" r="2"/>
    <circle cx="380" cy="58" r="3"/>
    <circle cx="450" cy="80" r="2"/>
    <circle cx="96" cy="120" r="2"/>
    <circle cx="420" cy="110" r="2"/>
  </g>

  <!-- Moon -->
  <circle cx="400" cy="96" r="28" fill="#f8fafc" opacity="0.9"/>
  <circle cx="412" cy="90" r="22" fill="#0b1220"/>

  <!-- Far skyline -->
  <g fill="#111827">
    <rect x="36" y="220" width="48" height="160"/>
    <rect x="92" y="180" width="40" height="200"/>
    <rect x="140" y="200" width="56" height="180"/>
    <rect x="204" y="160" width="44" height="220"/>
    <rect x="256" y="190" width="60" height="190"/>
    <rect x="324" y="150" width="48" height="230"/>
    <rect x="380" y="210" width="52" height="170"/>
    <rect x="440" y="170" width="40" height="210"/>
  </g>

  <!-- Neon windows -->
  <g>
    <g fill="#38bdf8" opacity="0.85">
      <rect x="102" y="200" width="8" height="8"/><rect x="116" y="200" width="8" height="8"/>
      <rect x="102" y="220" width="8" height="8"/><rect x="116" y="240" width="8" height="8"/>
      <rect x="150" y="220" width="8" height="8"/><rect x="168" y="240" width="8" height="8"/>
      <rect x="214" y="180" width="8" height="8"/><rect x="228" y="200" width="8" height="8"/>
      <rect x="270" y="210" width="8" height="8"/><rect x="288" y="230" width="8" height="8"/>
      <rect x="336" y="170" width="8" height="8"/><rect x="350" y="200" width="8" height="8"/>
      <rect x="392" y="230" width="8" height="8"/><rect x="450" y="190" width="8" height="8"/>
    </g>
    <g fill="#f472b6" opacity="0.75">
      <rect x="102" y="260" width="8" height="8"/><rect x="168" y="270" width="8" height="8"/>
      <rect x="228" y="250" width="8" height="8"/><rect x="288" y="270" width="8" height="8"/>
      <rect x="350" y="250" width="8" height="8"/><rect x="460" y="230" width="8" height="8"/>
    </g>
    <g fill="#fbbf24" opacity="0.7">
      <rect x="116" y="290" width="8" height="8"/><rect x="214" y="280" width="8" height="8"/>
      <rect x="336" y="290" width="8" height="8"/>
    </g>
  </g>

  <!-- The Wall (right edge) -->
  <g filter="url(#glow)">
    <rect x="430" y="120" width="36" height="280" fill="url(#wall)" stroke="#94a3b8" stroke-width="4"/>
    <rect x="438" y="140" width="8" height="40" fill="#0ea5e9" opacity="0.7"/>
    <rect x="450" y="200" width="8" height="40" fill="#f472b6" opacity="0.6"/>
    <rect x="438" y="260" width="8" height="40" fill="#fbbf24" opacity="0.65"/>
    <!-- breach gap -->
    <rect x="430" y="300" width="36" height="28" fill="#020617"/>
    <rect x="434" y="304" width="28" height="20" fill="url(#gold)" opacity="0.95"/>
  </g>

  <!-- Street / ground -->
  <rect x="0" y="380" width="512" height="132" fill="#0f172a"/>
  <rect x="0" y="380" width="512" height="10" fill="#1e293b"/>
  <!-- road dashes -->
  <g fill="#475569">
    <rect x="40" y="420" width="36" height="8" rx="2"/>
    <rect x="100" y="420" width="36" height="8" rx="2"/>
    <rect x="160" y="420" width="36" height="8" rx="2"/>
    <rect x="220" y="420" width="36" height="8" rx="2"/>
    <rect x="280" y="420" width="36" height="8" rx="2"/>
  </g>

  <!-- Escape pad (gold) -->
  <g filter="url(#glow)">
    <rect x="48" y="400" width="56" height="56" rx="8" fill="none" stroke="url(#gold)" stroke-width="6"/>
    <rect x="60" y="412" width="32" height="32" rx="4" fill="#f59e0b" opacity="0.35"/>
  </g>

  <!-- Runner silhouette -->
  <g transform="translate(200 300)" filter="url(#glow)">
    <!-- legs -->
    <rect x="10" y="52" width="10" height="28" rx="3" fill="#1e3a5f"/>
    <rect x="26" y="52" width="10" height="28" rx="3" fill="#1e3a5f"/>
    <!-- body -->
    <rect x="6" y="18" width="36" height="40" rx="6" fill="url(#neon)"/>
    <!-- head -->
    <circle cx="24" cy="8" r="14" fill="#fde68a"/>
    <!-- hair -->
    <ellipse cx="24" cy="-2" rx="14" ry="8" fill="#f472b6"/>
    <!-- stick / bat -->
    <rect x="44" y="22" width="8" height="48" rx="3" fill="#a8a29e" transform="rotate(25 48 46)"/>
    <!-- eyes -->
    <circle cx="20" cy="8" r="2" fill="#0f172a"/>
    <circle cx="30" cy="8" r="2" fill="#0f172a"/>
  </g>

  <!-- Grid Dog (small, left of runner) -->
  <g transform="translate(130 350)">
    <ellipse cx="20" cy="18" rx="22" ry="12" fill="#57534e"/>
    <ellipse cx="40" cy="14" rx="10" ry="8" fill="#78716c"/>
    <ellipse cx="48" cy="16" rx="6" ry="4" fill="#a8a29e"/>
    <circle cx="42" cy="12" r="2" fill="#fbbf24"/>
    <rect x="0" y="22" width="5" height="10" fill="#292524"/>
    <rect x="14" y="22" width="5" height="10" fill="#292524"/>
    <rect x="28" y="22" width="5" height="10" fill="#292524"/>
  </g>

  <!-- CW monogram badge -->
  <g transform="translate(360 400)">
    <rect width="110" height="72" rx="14" fill="#020617" stroke="#38bdf8" stroke-width="4"/>
    <text x="55" y="48" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="36" font-weight="800" fill="#f8fafc">CW</text>
  </g>
</svg>
